      React.createElement("div", { className: "grid grid-cols-2 gap-3 mb-5" },
        React.createElement("div", { className: "rounded-xl p-4", style: { background: C.surface, border: `1px solid ${C.line}` } },
          React.createElement("p", { style: { color: C.gold, fontSize: 28, fontWeight: 700 } }, members.length),
          React.createElement("p", { style: { color: C.mute, fontSize: 12 } }, "Membres total")
        ),
        React.createElement("div", { className: "rounded-xl p-4", style: { background: C.surface, border: `1px solid ${C.line}` } },
          React.createElement("p", { style: { color: C.teal, fontSize: 28, fontWeight: 700 } }, totalEvents),
          React.createElement("p", { style: { color: C.mute, fontSize: 12 } }, "Événements créés")
        ),
        React.createElement("div", { className: "rounded-xl p-4", style: { background: C.surface, border: `1px solid ${C.line}` } },
          React.createElement("p", { style: { color: C.violet, fontSize: 28, fontWeight: 700 } }, totalPast),
          React.createElement("p", { style: { color: C.mute, fontSize: 12 } }, "Événements passés")
        ),
        React.createElement("div", { className: "rounded-xl p-4", style: { background: C.surface, border: `1px solid ${C.line}` } },
          React.createElement("p", { style: { color: C.coral, fontSize: 28, fontWeight: 700 } }, avgRate + "%"),
          React.createElement("p", { style: { color: C.mute, fontSize: 12 } }, "Taux présence moyen")
        )
      ),
      React.createElement("h3", { style: { ...displayStyle, color: C.cream, fontSize: 15, marginBottom: 10 } }, "Top 5 membres assidus"),
      React.createElement("div", { className: "flex flex-col gap-2 mb-5" },
        topMembers.map((m, i) => React.createElement("div", { key: m.id, className: "flex items-center justify-between px-4 py-3 rounded-xl", style: { background: C.surface, border: `1px solid ${C.line}` } },
          React.createElement("div", { className: "flex items-center gap-3" },
            React.createElement("span", { style: { color: i < 3 ? C.gold : C.mute, fontWeight: 700, fontSize: 16, width: 20 } }, i === 0 ? "🥇" : i === 1 ? "🥈" : i === 2 ? "🥉" : (i + 1) + "."),
            React.createElement(AvatarColor, { name: m.name, size: "sm" }),
            React.createElement("p", { style: { color: C.cream, fontSize: 14 } }, m.name)
          ),
          React.createElement("span", { style: { fontFamily: "'IBM Plex Mono', monospace", color: C.teal, fontWeight: 600 } }, (rateFor(m.id) ?? 0) + "%")
        ))
      ),
      pastEvents.length > 0 && React.createElement("button", { onClick: () => exportCSV(pastEvents), className: "btn flex items-center gap-2 px-4 py-3 rounded-xl font-semibold text-sm w-full justify-center", style: { background: C.surface, border: `1px solid ${C.line}`, color: C.teal } }, React.createElement(Download, { size: 16 }), " Exporter le rapport CSV complet")
    );
  }

  // ========== FIN NOUVEAUX PANELS v3 ==========

  // ========== FIN NOUVEAUX COMPOSANTS v2 ==========
  
  // === Effet RIPPLE global (style GE-FAIS), non-intrusif ===
  (function(){
    function addRipple(el, e){
      try {
        const rect = el.getBoundingClientRect();
        const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
        const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
        const r = document.createElement("span");
        r.className = "ripple-effect";
        const size = Math.max(rect.width, rect.height) * 2;
        r.style.cssText = `width:${size}px;height:${size}px;left:${x-size/2}px;top:${y-size/2}px;`;
        el.classList.add("ripple-container");
        el.appendChild(r);
        setTimeout(()=>r.remove(), 650);
      } catch(_) {}
    }
    document.addEventListener("click", function(e){
      const btn = e.target.closest && e.target.closest("button, .nav-item, .quick-action, .member-card-v2");
      if (btn && !btn.closest("input, textarea, select")) addRipple(btn, e);
    }, { passive: true });
  })();

  ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
})();

</script>
